name: CI

# Tum push ve PR'lar icin: typecheck + build smoke.
# `production` branch'e merge ONCESI bu workflow'un YESIL olmasi sart
# (GitHub repo ayarlarindan branch protection ile zorunlu kilinmali —
# bkz. DEPLOY_GITHUB.md adim 4).

on:
  push:
    branches: [development, production, main]
  pull_request:
    branches: [development, production, main]

# Ayni branch'e art arda push gelirse onceki run'i iptal et — kredi tasarrufu.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-and-build:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (libs + all artifacts)
        run: pnpm run typecheck

      - name: Build api-server (smoke)
        env:
          PORT: "8080"
          BASE_PATH: "/api"
        run: pnpm --filter @workspace/api-server run build

      - name: Build buro-ajani (smoke)
        env:
          PORT: "8081"
          BASE_PATH: "/"
        run: pnpm --filter @workspace/buro-ajani run build

  docker-build:
    name: Docker image build (api)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: typecheck-and-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build api image (no push, sadece dogrulama)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.api
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: agent-de-bureau-api:ci
