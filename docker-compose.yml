##############################################################################
# Agent de Bureau — Docker Compose
#
# Services:
#   postgres  — PostgreSQL 16 database
#   api       — Express API server (port 8080)
#   web       — Nginx serving React apps + proxying /api (port 80 / 443)
#
# Usage:
#   cp deploy/.env.template .env   # fill in values
#   docker compose up -d
#   docker compose logs -f api
##############################################################################

services:
  # --------------------------------------------------------------------------
  # PostgreSQL Database
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: adb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agentdebureau
      POSTGRES_USER: adb_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adb_user -d agentdebureau"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - adb-internal

  # --------------------------------------------------------------------------
  # API Server (Express)
  # --------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: adb-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "8080"
      DATABASE_URL: postgresql://adb_user:${POSTGRES_PASSWORD}@postgres:5432/agentdebureau
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET in .env}
      APP_URL: ${APP_URL:-http://localhost}

      # AI providers
      AI_INTEGRATIONS_GEMINI_API_KEY: ${AI_INTEGRATIONS_GEMINI_API_KEY:-}
      AI_INTEGRATIONS_GEMINI_BASE_URL: ${AI_INTEGRATIONS_GEMINI_BASE_URL:-https://generativelanguage.googleapis.com}
      AI_INTEGRATIONS_OPENAI_API_KEY: ${AI_INTEGRATIONS_OPENAI_API_KEY:-}
      AI_INTEGRATIONS_OPENAI_BASE_URL: ${AI_INTEGRATIONS_OPENAI_BASE_URL:-https://api.openai.com/v1}
      AI_INTEGRATIONS_ANTHROPIC_API_KEY: ${AI_INTEGRATIONS_ANTHROPIC_API_KEY:-}
      AI_INTEGRATIONS_ANTHROPIC_BASE_URL: ${AI_INTEGRATIONS_ANTHROPIC_BASE_URL:-https://api.anthropic.com}

      # Twilio
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}

      # Resend
      RESEND_API_KEY: ${RESEND_API_KEY:-}

      # Google OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}

      # Google Drive backup (service account)
      GOOGLE_SERVICE_ACCOUNT_KEY_JSON_B64: ${GOOGLE_SERVICE_ACCOUNT_KEY_JSON_B64:-}

      # Backup encryption
      BACKUP_ENCRYPTION_KEY: ${BACKUP_ENCRYPTION_KEY:-}
    networks:
      - adb-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # --------------------------------------------------------------------------
  # Web Front-end (Nginx)
  # --------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        VITE_API_BASE_URL: /api
    container_name: adb-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      # Uncomment to expose HTTPS (mount certs via volumes):
      # - "443:443"
    networks:
      - adb-internal
      - adb-external

volumes:
  postgres_data:
    driver: local

networks:
  adb-internal:
    driver: bridge
  adb-external:
    driver: bridge
