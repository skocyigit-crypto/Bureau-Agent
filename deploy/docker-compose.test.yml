services:
  postgres-test:
    image: postgres:16
    container_name: agent-bureau-test-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${TEST_POSTGRES_PASSWORD}
      POSTGRES_DB: agent_de_bureau_test
    ports:
      - "127.0.0.1:55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agent_de_bureau_test"]
      interval: 2s
      timeout: 3s
      retries: 20
    tmpfs:
      - /var/lib/postgresql/data
