##############################################################################
# Agent de Bureau — Nginx Configuration
# Nginx reverse proxy for self-hosted deployment.
# Place this file at /etc/nginx/sites-available/agentdebureau and symlink:
#   sudo ln -s /etc/nginx/sites-available/agentdebureau /etc/nginx/sites-enabled/
##############################################################################

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;

    # Redirect HTTP to HTTPS (uncomment after SSL is set up)
    # return 301 https://$host$request_uri;

    # -----------------------------------------------------------------------
    # API Server (Express, port 8080)
    # -----------------------------------------------------------------------
    location /api/ {
        limit_req zone=api burst=60 nodelay;

        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host $host;
        proxy_read_timeout 120s;

        # WebSocket support (for SSE / long-polling)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Stricter rate limit for auth routes
    location ~ ^/api/(auth|register)/ {
        limit_req zone=auth burst=10 nodelay;

        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host $host;
    }

    # -----------------------------------------------------------------------
    # Tanitim landing site (React/Vite, path /tanitim/)
    # -----------------------------------------------------------------------
    location /tanitim/ {
        alias /var/www/agentdebureau/tanitim/;
        try_files $uri $uri/ /tanitim/index.html;
        expires 1d;
        add_header Cache-Control "public, must-revalidate";

        # Cache hashed assets for longer
        location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # -----------------------------------------------------------------------
    # Main web app — Büro Ajanı (React/Vite, path /)
    # -----------------------------------------------------------------------
    location / {
        root /var/www/agentdebureau/buro-ajani;
        try_files $uri $uri/ /index.html;
        expires 1d;
        add_header Cache-Control "public, must-revalidate";

        # Cache hashed assets for longer
        location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Logs
    access_log /var/log/nginx/agentdebureau_access.log;
    error_log  /var/log/nginx/agentdebureau_error.log;
}

