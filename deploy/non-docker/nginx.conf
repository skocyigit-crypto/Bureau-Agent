##############################################################################
# Agent de Bureau — Nginx Configuration
# Nginx reverse proxy for self-hosted deployment.
# Place this file at /etc/nginx/sites-available/agentdebureau and symlink:
#   sudo ln -s /etc/nginx/sites-available/agentdebureau /etc/nginx/sites-enabled/
##############################################################################

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

# H2C cleartext-upgrade smuggling defence: only forward Upgrade/Connection
# when the client requested a WebSocket. Drops `Upgrade: h2c` and similar
# attempts to smuggle HTTP/2 cleartext through the proxy.
# Reference: https://portswigger.net/research/http2-the-sequel-is-always-worse
map $http_upgrade $safe_upgrade {
    default     "";
    websocket   $http_upgrade;
}
map $http_upgrade $safe_connection {
    default     "close";
    websocket   "upgrade";
}

# Default server: reject requests whose Host doesn't match the configured
# server_name below. Without this, the upstream Express app receives
# attacker-controlled Host values via `proxy_set_header Host $host`.
# 444 closes the connection without a response.
server {
    listen 80 default_server;
    server_name _;
    return 444;
}

server {
    listen 80;
    # Replace YOUR_DOMAIN_OR_IP with the real hostname at deploy time.
    # Only requests whose Host matches will reach this block; everything
    # else hits the default_server above and is dropped.
    server_name YOUR_DOMAIN_OR_IP;

    # Redirect HTTP to HTTPS (uncomment after SSL is set up)
    # return 301 https://$host$request_uri;

    # -----------------------------------------------------------------------
    # API Server (Express, port 8080)
    # -----------------------------------------------------------------------
    location /api/ {
        limit_req zone=api burst=60 nodelay;

        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host $host;
        proxy_read_timeout 120s;

        # WebSocket / SSE support — sanitised Upgrade headers (see map above).
        proxy_set_header Upgrade $safe_upgrade;
        proxy_set_header Connection $safe_connection;
    }

    # Stricter rate limit for auth routes
    location ~ ^/api/(auth|register)/ {
        limit_req zone=auth burst=10 nodelay;

        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host $host;
    }

    # -----------------------------------------------------------------------
    # Tanitim landing site (React/Vite, path /tanitim/)
    # -----------------------------------------------------------------------
    location /tanitim/ {
        alias /var/www/agentdebureau/tanitim/;
        try_files $uri $uri/ /tanitim/index.html;
        expires 1d;
        add_header Cache-Control "public, must-revalidate";

        # Cache hashed assets for longer
        location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # -----------------------------------------------------------------------
    # Main web app — Büro Ajanı (React/Vite, path /)
    # -----------------------------------------------------------------------
    location / {
        root /var/www/agentdebureau/buro-ajani;
        try_files $uri $uri/ /index.html;
        expires 1d;
        add_header Cache-Control "public, must-revalidate";

        # Cache hashed assets for longer
        location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Security headers
    # CSP — same policy as the docker web container (see docker/nginx-web.conf
    # for rationale on each directive). Allows Google Fonts CSS/woff2 and
    # form posts to Stripe / Google OAuth, blocks all iframes / inline JS /
    # plugins / base-tag injection, and forces HTTPS for any sub-resource.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self'; frame-src 'none'; frame-ancestors 'none'; form-action 'self' https://checkout.stripe.com https://billing.stripe.com https://accounts.google.com; base-uri 'none'; object-src 'none'; upgrade-insecure-requests" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # Logs
    access_log /var/log/nginx/agentdebureau_access.log;
    error_log  /var/log/nginx/agentdebureau_error.log;
}

