kind = "web"
previewPath = "/"
title = "Büro Ajanı"
version = "1.0.0"
id = "artifacts/buro-ajani"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19542

[services.development]
run = "pnpm --filter @workspace/buro-ajani run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/buro-ajani", "run", "build" ]
publicDir = "artifacts/buro-ajani/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19542"
BASE_PATH = "/"
