<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
    <title>Ajant Bureau - Solution Professionnelle</title>
    <meta name="description" content="Ajant Bureau - Solution professionnelle de gestion de bureau et centre d'appels. Tableau de bord, appels, contacts, taches, messages, analyse IA." />
    <!-- Admin / espace client: jamais indexer. Defense-en-profondeur en plus de robots.txt
         (certains crawlers ignorent robots mais respectent X-Robots-Tag / meta robots). -->
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
    <meta name="googlebot" content="noindex, nofollow" />
    <meta name="theme-color" content="#1a2744" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Agent Bureau" />
    <meta name="application-name" content="Ajant Bureau" />
    <meta name="msapplication-TileColor" content="#1a2744" />
    <meta name="msapplication-config" content="none" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Async font CSS load: print -> all media swap evite le blocage du
         premier paint. Le <noscript> garde le texte lisible sans JS. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function() {
          navigator.serviceWorker.register("/sw.js").catch(function() {});
        });
      }
    </script>
  </body>
</html>
