<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <title>Agent de Bureau — Standardiste IA, agenda et CRM pour PME</title>
    <meta name="description" content="Agent de Bureau centralise vos appels, contacts, taches et messages avec une IA francaise. Standardiste virtuelle 24/7, transcription, CRM, agenda et facturation pour PME et professions liberales." />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="canonical" href="https://agentdebureau.fr/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:site_name" content="Agent de Bureau" />
    <meta property="og:title" content="Agent de Bureau — Standardiste IA, agenda et CRM pour PME" />
    <meta property="og:description" content="Centralisez appels, contacts, taches et messages avec une IA francaise. Standardiste virtuelle 24/7." />
    <meta property="og:image" content="/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Agent de Bureau — Standardiste IA pour PME" />
    <meta name="twitter:description" content="Centralisez appels, contacts, taches et messages avec une IA francaise." />
    <meta name="twitter:image" content="/opengraph.jpg" />

    <!-- Fonts: preconnect already gives us TLS warmup; load the CSS without
         blocking the first paint via the print -> all media swap. The <noscript>
         fallback keeps text readable for the ~1% of clients without JS. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
