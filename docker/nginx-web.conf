##############################################################################
# Nginx config inside the web Docker container.
# Serves buro-ajani at / and tanitim at /tanitim/
# Proxies /api/ to the api container.
##############################################################################

# H2C cleartext-upgrade smuggling defence: only forward the Upgrade /
# Connection headers when the client actually requested a WebSocket. Any
# other Upgrade value (notably "h2c") is dropped, preventing an attacker
# from coercing the upstream into HTTP/2-cleartext smuggling. See
# https://portswigger.net/research/http2-the-sequel-is-always-worse.
map $http_upgrade $safe_upgrade {
    default     "";
    websocket   $http_upgrade;
}
map $http_upgrade $safe_connection {
    default     "close";
    websocket   "upgrade";
}

# Default server: reject requests whose Host header doesn't match a known
# server_name. This neutralises Host-header attacks against the upstream
# Express app, which receives `Host: $host` below — without this guard, a
# malicious client could send arbitrary Host values.
server {
    listen 80 default_server;
    server_name _;
    return 444;
}

server {
    listen 80;
    # Override `_` with the real domain at deploy time. This server only
    # answers requests whose Host matches; everything else hits the
    # default_server above and is dropped with a connection close.
    server_name agentdebureau.fr www.agentdebureau.fr;

    # -----------------------------------------------------------------------
    # API — proxy to api container
    # -----------------------------------------------------------------------
    location /api/ {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_set_header   Upgrade $safe_upgrade;
        proxy_set_header   Connection $safe_connection;
    }

    # -----------------------------------------------------------------------
    # Tanitim landing site
    # -----------------------------------------------------------------------
    location /tanitim/ {
        alias /usr/share/nginx/html/tanitim/;
        try_files $uri $uri/ /tanitim/index.html;
        expires 1d;
        add_header Cache-Control "public, must-revalidate";

        location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # -----------------------------------------------------------------------
    # Büro Ajanı — main web app
    # -----------------------------------------------------------------------
    location / {
        root /usr/share/nginx/html/buro-ajani;
        try_files $uri $uri/ /index.html;
        expires 1d;
        add_header Cache-Control "public, must-revalidate";

        location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Security headers
    # CSP — derived from a full audit of external resources used by the SPAs:
    #   - Google Fonts (CSS + woff2) on fonts.googleapis.com / fonts.gstatic.com
    #   - Stripe Checkout / Billing redirects (form-action only — no embedded iframe)
    #   - Google OAuth redirect to accounts.google.com (form-action)
    # `frame-ancestors 'none'` replaces X-Frame-Options for modern browsers and
    # blocks clickjacking even if X-Frame-Options is stripped.
    # `base-uri 'none'` prevents <base> tag injection from rerouting relative
    # URLs (a classic post-XSS escalation).
    # `object-src 'none'` blocks legacy Flash/PDF plugin XSS vectors.
    # `upgrade-insecure-requests` hardens any accidental http:// asset URL.
    # Style 'unsafe-inline' is required by Tailwind/shadcn injected styles —
    # script-src deliberately omits it (no inline <script>).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self'; frame-src 'none'; frame-ancestors 'none'; form-action 'self' https://checkout.stripe.com https://billing.stripe.com https://accounts.google.com; base-uri 'none'; object-src 'none'; upgrade-insecure-requests" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;
}
