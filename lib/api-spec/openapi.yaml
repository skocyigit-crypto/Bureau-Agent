components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    UserPreferences:
      type: object
      properties:
        inlineSuggestEnabled:
          type: boolean
          description: Master switch for inline ghost-text AI suggestions. When true, suggestions are shown while typing in any field type covered by `inlineSuggestFields` (notes, prospect notes, email bodies, call notes, task descriptions, message bodies, project descriptions, project notes, quote and invoice comments).
        inlineSuggestLanguage:
          type: string
          description: Language hint passed to the inline-suggest AI prompt (e.g. "francais", "english", "deutsch"). Defaults to "francais" when unset.
        inlineSuggestFields:
          $ref: "#/components/schemas/InlineSuggestFieldFlags"

    InlineSuggestFieldFlags:
      type: object
      description: Per-field opt-in for inline AI suggestions. Each flag is independent and combined with `inlineSuggestEnabled` (master switch). When omitted, defaults to true.
      properties:
        note:
          type: boolean
          description: Suggestions in internal notes (notes internes).
        prospect_note:
          type: boolean
          description: Suggestions in prospect notes (notes de prospect).
        email_body:
          type: boolean
          description: Suggestions in email bodies (corps des e-mails).
        call_note:
          type: boolean
          description: Suggestions in call notes (notes d'appel).
        task_description:
          type: boolean
          description: Suggestions in task descriptions (descriptions de tâches).
        message_content:
          type: boolean
          description: Suggestions in message bodies (corps des messages).
        project_description:
          type: boolean
          description: Suggestions in project descriptions (descriptions de projets).
        project_note:
          type: boolean
          description: Suggestions in project notes (notes de projet).
        quote_comment:
          type: boolean
          description: Suggestions in quote comments (commentaires de devis).
        invoice_comment:
          type: boolean
          description: Suggestions in invoice comments (commentaires de facture).

    Call:
      type: object
      properties:
        id:
          type: integer
        contactId:
          type: integer
          nullable: true
        contactName:
          type: string
          nullable: true
        phoneNumber:
          type: string
        direction:
          type: string
          enum: [entrant, sortant]
        status:
          type: string
          enum: [repondu, manque, messagerie, en_cours]
        duration:
          type: integer
          description: Duration in seconds
        notes:
          type: string
          nullable: true
        sentiment:
          type: string
          enum: [tres_positif, positif, neutre, negatif, tres_negatif]
          nullable: true
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, phoneNumber, direction, status, duration, tags, createdAt, updatedAt]

    CreateCallBody:
      type: object
      properties:
        contactId:
          type: integer
          nullable: true
        phoneNumber:
          type: string
        direction:
          type: string
          enum: [entrant, sortant]
        status:
          type: string
          enum: [repondu, manque, messagerie, en_cours]
        duration:
          type: integer
        notes:
          type: string
          nullable: true
        sentiment:
          type: string
          enum: [tres_positif, positif, neutre, negatif, tres_negatif]
          nullable: true
        tags:
          type: array
          items:
            type: string
      required: [phoneNumber, direction, status, duration]

    UpdateCallBody:
      type: object
      properties:
        contactId:
          type: integer
          nullable: true
        status:
          type: string
          enum: [repondu, manque, messagerie, en_cours]
        duration:
          type: integer
        notes:
          type: string
          nullable: true
        sentiment:
          type: string
          enum: [tres_positif, positif, neutre, negatif, tres_negatif]
          nullable: true
        tags:
          type: array
          items:
            type: string

    Contact:
      type: object
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        company:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phone:
          type: string
        mobile:
          type: string
          nullable: true
        category:
          type: string
          enum: [client, prospect, fournisseur, partenaire, autre]
        address:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        totalCalls:
          type: integer
        lastCallAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, firstName, lastName, phone, category, totalCalls, createdAt, updatedAt]

    CreateContactBody:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        company:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phone:
          type: string
        mobile:
          type: string
          nullable: true
        category:
          type: string
          enum: [client, prospect, fournisseur, partenaire, autre]
        address:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
      required: [firstName, lastName, phone, category]

    UpdateContactBody:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        company:
