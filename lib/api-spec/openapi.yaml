openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Bureau Agent API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: calls
    description: Call management
  - name: contacts
    description: Contact management
  - name: tasks
    description: Task management
  - name: messages
    description: Voicemail and message management
  - name: dashboard
    description: Dashboard analytics
  - name: ai
    description: AI-powered intelligence
  - name: workspace
    description: Google Workspace integration

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # === CALLS ===
  /calls:
    get:
      operationId: listCalls
      tags: [calls]
      summary: List all calls
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [answered, missed, voicemail, outgoing, all]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: search
          in: query
          schema:
            type: string
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [createdAt, duration, status, contactName]
            default: createdAt
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          schema:
            type: string
            format: date-time
        - name: direction
          in: query
          schema:
            type: string
            enum: [entrant, sortant, all]
      responses:
        "200":
          description: List of calls
          content:
            application/json:
              schema:
                type: object
                properties:
                  calls:
                    type: array
                    items:
                      $ref: "#/components/schemas/Call"
                  total:
                    type: integer
                required: [calls, total]
    post:
      operationId: createCall
      tags: [calls]
      summary: Create a new call record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCallBody"
      responses:
        "201":
          description: Call created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Call"

  /calls/{id}:
    get:
      operationId: getCall
      tags: [calls]
      summary: Get a single call
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Call details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Call"
        "404":
          description: Not found
    patch:
      operationId: updateCall
      tags: [calls]
      summary: Update a call record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCallBody"
      responses:
        "200":
          description: Updated call
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Call"
    delete:
      operationId: deleteCall
      tags: [calls]
      summary: Delete a call record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # === CONTACTS ===
  /contacts:
    get:
      operationId: listContacts
      tags: [contacts]
      summary: List contacts
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
            enum: [client, prospect, fournisseur, partenaire, autre, all]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [createdAt, firstName, lastName, company, totalCalls]
            default: createdAt
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        "200":
          description: List of contacts
          content:
            application/json:
              schema:
                type: object
                properties:
                  contacts:
                    type: array
                    items:
                      $ref: "#/components/schemas/Contact"
                  total:
                    type: integer
                required: [contacts, total]
    post:
      operationId: createContact
      tags: [contacts]
      summary: Create a contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContactBody"
      responses:
        "201":
          description: Contact created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"

  /contacts/{id}:
    get:
      operationId: getContact
      tags: [contacts]
      summary: Get a single contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contact details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
    patch:
      operationId: updateContact
      tags: [contacts]
      summary: Update a contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContactBody"
      responses:
        "200":
          description: Updated contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
    delete:
      operationId: deleteContact
      tags: [contacts]
      summary: Delete a contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # === TASKS ===
  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [en_attente, en_cours, termine, annule, all]
        - name: priority
          in: query
          schema:
            type: string
            enum: [haute, moyenne, basse, all]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: search
          in: query
          schema:
            type: string
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [createdAt, dueDate, priority, status, title]
            default: createdAt
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: object
                properties:
                  tasks:
                    type: array
                    items:
                      $ref: "#/components/schemas/Task"
                  total:
                    type: integer
                required: [tasks, total]
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskBody"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskBody"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # === MESSAGES ===
  /messages:
    get:
      operationId: listMessages
      tags: [messages]
      summary: List voicemail/messages
      parameters:
        - name: read
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: search
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [messagerie_vocale, note, rappel, all]
        - name: priority
          in: query
          schema:
            type: string
            enum: [haute, moyenne, basse, all]
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [createdAt, priority, type]
            default: createdAt
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/Message"
                  total:
                    type: integer
                required: [messages, total]
    post:
      operationId: createMessage
      tags: [messages]
      summary: Create a message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMessageBody"
      responses:
        "201":
          description: Message created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /messages/{id}:
    get:
      operationId: getMessage
      tags: [messages]
      summary: Get a message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Message detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
    patch:
      operationId: updateMessage
      tags: [messages]
      summary: Update a message (mark as read, etc.)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMessageBody"
      responses:
        "200":
          description: Updated message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
    delete:
      operationId: deleteMessage
      tags: [messages]
      summary: Delete a message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # === CONTACT DETAILS ===
  /contacts/{id}/calls:
    get:
      operationId: getContactCalls
      tags: [contacts]
      summary: Get call history for a contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Contact call history
          content:
            application/json:
              schema:
                type: object
                properties:
                  calls:
                    type: array
                    items:
                      $ref: "#/components/schemas/Call"
                  total:
                    type: integer
                required: [calls, total]

  /contacts/{id}/tasks:
    get:
      operationId: getContactTasks
      tags: [contacts]
      summary: Get tasks related to a contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contact related tasks
          content:
            application/json:
              schema:
                type: object
                properties:
                  tasks:
                    type: array
                    items:
                      $ref: "#/components/schemas/Task"
                required: [tasks]

  # === DASHBOARD / ANALYTICS ===
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Dashboard summary stats
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/call-analytics:
    get:
      operationId: getCallAnalytics
      tags: [dashboard]
      summary: Call analytics over time
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [today, week, month, year]
            default: week
      responses:
        "200":
          description: Call analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallAnalytics"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Recent activity feed
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Recent activity items
          content:
            application/json:
              schema:
                type: object
                properties:
                  activities:
                    type: array
                    items:
                      $ref: "#/components/schemas/ActivityItem"
                required: [activities]

  /dashboard/call-distribution:
    get:
      operationId: getCallDistribution
      tags: [dashboard]
      summary: Call distribution by status
      responses:
        "200":
          description: Call distribution data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallDistribution"

  /dashboard/top-contacts:
    get:
      operationId: getTopContacts
      tags: [dashboard]
      summary: Most active contacts
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 5
      responses:
        "200":
          description: Top contacts
          content:
            application/json:
              schema:
                type: object
                properties:
                  contacts:
                    type: array
                    items:
                      $ref: "#/components/schemas/TopContact"
                required: [contacts]

  /dashboard/hourly-performance:
    get:
      operationId: getHourlyPerformance
      tags: [dashboard]
      summary: Call volume by hour of day
      responses:
        "200":
          description: Hourly call performance
          content:
            application/json:
              schema:
                type: object
                properties:
                  hours:
                    type: array
                    items:
                      type: object
                      properties:
                        hour:
                          type: integer
                        total:
                          type: integer
                        answered:
                          type: integer
                        missed:
                          type: integer
                      required: [hour, total, answered, missed]
                required: [hours]

  /dashboard/task-stats:
    get:
      operationId: getTaskStats
      tags: [dashboard]
      summary: Task completion statistics
      responses:
        "200":
          description: Task stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskStats"

  /dashboard/weekly-report:
    get:
      operationId: getWeeklyReport
      tags: [dashboard]
      summary: Weekly performance report
      responses:
        "200":
          description: Weekly report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyReport"

  /dashboard/notifications:
    get:
      operationId: getNotifications
      tags: [dashboard]
      summary: Get system notifications
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: object
                properties:
                  notifications:
                    type: array
                    items:
                      $ref: "#/components/schemas/Notification"
                  unreadCount:
                    type: integer
                required: [notifications, unreadCount]

  # === AI ===
  /ai/status:
    get:
      operationId: getAiStatus
      tags: [ai]
      summary: Check AI availability
      responses:
        "200":
          description: AI status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiStatus"

  /ai/analyze:
    post:
      operationId: requestAiAnalysis
      tags: [ai]
      summary: Request comprehensive AI analysis
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: AI analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiAnalysisResult"

  /ai/suggest:
    post:
      operationId: requestAiSuggestions
      tags: [ai]
      summary: Get AI suggestions for a specific page
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                page:
                  type: string
                  enum: [dashboard, calls, contacts, tasks, messages]
              required: [page]
      responses:
        "200":
          description: AI suggestions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiSuggestionsResult"

  /ai/validate:
    post:
      operationId: requestAiValidation
      tags: [ai]
      summary: AI-powered form validation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entityType:
                  type: string
                  enum: [call, contact, task, message]
                data:
                  type: object
              required: [entityType, data]
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiValidationResult"

  /ai/recognize:
    post:
      operationId: requestAiRecognition
      tags: [ai]
      summary: AI-powered comprehensive pattern recognition and detection
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Recognition detections and health score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiRecognitionResult"

  /ai/assistant:
    post:
      operationId: askAiAssistant
      tags: [ai]
      summary: Ask the AI assistant a question
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                question:
                  type: string
                currentPage:
                  type: string
              required: [question]
      responses:
        "200":
          description: AI assistant response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiAssistantResponse"

  /workspace/status:
    get:
      operationId: getWorkspaceStatus
      tags: [workspace]
      summary: Get Google Workspace connection status
      responses:
        "200":
          description: Workspace status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceStatus"

  /workspace/connect/{serviceId}:
    post:
      operationId: connectWorkspaceService
      tags: [workspace]
      summary: Initiate Google service connection
      parameters:
        - name: serviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Connection initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
                  authUrl:
                    type: string
                  service:
                    type: string

  /workspace/disconnect/{serviceId}:
    post:
      operationId: disconnectWorkspaceService
      tags: [workspace]
      summary: Disconnect a Google service
      parameters:
        - name: serviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Service disconnected
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string

  /workspace/sync:
    post:
      operationId: syncWorkspace
      tags: [workspace]
      summary: Trigger workspace synchronization
      responses:
        "200":
          description: Sync initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
                  startedAt:
                    type: string

  /workspace/calendar/events:
    get:
      operationId: getCalendarEvents
      tags: [workspace]
      summary: List Google Calendar events
      responses:
        "200":
          description: Calendar events
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      type: object
                  message:
                    type: string
                  connected:
                    type: boolean

  /workspace/gmail/messages:
    get:
      operationId: getGmailMessages
      tags: [workspace]
      summary: List Gmail messages
      responses:
        "200":
          description: Gmail messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      type: object
                  message:
                    type: string
                  connected:
                    type: boolean

  /workspace/drive/files:
    get:
      operationId: getDriveFiles
      tags: [workspace]
      summary: List Google Drive files
      responses:
        "200":
          description: Drive files
          content:
            application/json:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items:
                      type: object
                  message:
                    type: string
                  connected:
                    type: boolean

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Call:
      type: object
      properties:
        id:
          type: integer
        contactId:
          type: integer
          nullable: true
        contactName:
          type: string
          nullable: true
        phoneNumber:
          type: string
        direction:
          type: string
          enum: [entrant, sortant]
        status:
          type: string
          enum: [repondu, manque, messagerie, en_cours]
        duration:
          type: integer
          description: Duration in seconds
        notes:
          type: string
          nullable: true
        sentiment:
          type: string
          enum: [positif, neutre, negatif]
          nullable: true
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, phoneNumber, direction, status, duration, tags, createdAt, updatedAt]

    CreateCallBody:
      type: object
      properties:
        contactId:
          type: integer
          nullable: true
        phoneNumber:
          type: string
        direction:
          type: string
          enum: [entrant, sortant]
        status:
          type: string
          enum: [repondu, manque, messagerie, en_cours]
        duration:
          type: integer
        notes:
          type: string
          nullable: true
        sentiment:
          type: string
          enum: [positif, neutre, negatif]
          nullable: true
        tags:
          type: array
          items:
            type: string
      required: [phoneNumber, direction, status, duration]

    UpdateCallBody:
      type: object
      properties:
        contactId:
          type: integer
          nullable: true
        status:
          type: string
          enum: [repondu, manque, messagerie, en_cours]
        duration:
          type: integer
        notes:
          type: string
          nullable: true
        sentiment:
          type: string
          enum: [positif, neutre, negatif]
          nullable: true
        tags:
          type: array
          items:
            type: string

    Contact:
      type: object
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        company:
          type: string
          nullable: true
